<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}My Todoo{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ base_url }}static/css/main.css">
</head>
<body>
    <header>
        <nav>
            <h1 class="logo"><a href="{{ base_url }}">✅ My Todoo</a></h1>
            <ul>
                <li><a href="{{ base_url }}">Accueil</a></li>
                <li><a href="{{ base_url }}?uri=history">Historique</a></li>
                <li><a href="{{ base_url }}?uri=about">À propos</a></li>
            </ul>
        </nav>
        <div class="header-banner">
            {% block header_content %}{% endblock %}
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2024 My Todoo - Un projet pédagogique sur l'architecture MVC</p>
    </footer>
</body>
</html>
