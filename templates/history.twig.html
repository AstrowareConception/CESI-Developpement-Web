{% extends "layout.twig.html" %}

{% block title %}History - My Todoo{% endblock %}

{% block content %}
    <h2>Tâches terminées</h2>
    <div class="card">
        <ul class="task-list">
        {% for task in tasks %}
            <li class="task-item">
                <div class="task-content">
                    <span class="task-done">{{ task.task }}</span>
                </div>
                <div class="task-actions">
                    <form action="{{ base_url }}?uri=uncheck_task" method="post">
                        <input name="id" type="hidden" value="{{ task.id }}">
                        <button type="submit" class="danger">Annuler</button>
                    </form>
                </div>
            </li>
        {% else %}
            <li class="empty-state">
                <p>Aucune tâche dans l'historique pour le moment.</p>
            </li>
        {% endfor %}
        </ul>
    </div>
{% endblock %}
